<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf9f5">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Pocket Claude</title>
<style>
  :root {
    --bg: #faf9f5; --card: #ffffff; --card2: #f0efe8; --text: #1f1e1b;
    --dim: #8a8778; --accent: #d97757; --accent-soft: #f5e8e2;
    --me: #eef0f4; --border: #e8e6dd; --shadow: 0 1px 4px rgba(0,0,0,.06);
    --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #262624; --card: #30302e; --card2: #3a3a37; --text: #eceae4;
      --dim: #a8a598; --accent: #d97757; --accent-soft: #453832;
      --me: #3d4450; --border: #3c3b37; --shadow: 0 1px 4px rgba(0,0,0,.25);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font: 16px/1.45 -apple-system, "SF Pro Text", sans-serif; height: 100dvh; overflow: hidden; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg); }
  .hidden { display: none !important; }
  button { font-family: inherit; }

  header { padding: calc(var(--safe-top) + 10px) 14px 10px; display: flex; align-items: center; gap: 10px; background: var(--bg); }
  header .mid { flex: 1; text-align: center; min-width: 0; }
  header h1 { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .sub { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .iconbtn { width: 38px; height: 38px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow); color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center; flex: none; }

  .list { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 8px 14px calc(var(--safe-bottom) + 20px); }
  .ghead { margin: 16px 2px 8px; font-size: 13px; font-weight: 800; letter-spacing: .07em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 8px; background: none; border: none; width: 100%; text-align: left; padding: 6px 2px; }
  .ghead .chev { font-size: 13px; transition: transform .15s; }
  .ghead.open .chev { transform: rotate(90deg); }
  .ghead .cnt { color: var(--dim); font-weight: 600; margin-left: auto; letter-spacing: 0; }
  .sess { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 14px; margin-bottom: 8px; display: block; width: 100%; text-align: left; color: var(--text); box-shadow: var(--shadow); }
  .sess:active { background: var(--card2); }
  .sess .t { font-weight: 650; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .sess .t span.title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sess .p { color: var(--dim); font-size: 13px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sess .when { color: var(--dim); font-size: 11px; margin-top: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.live { background: #4caf7d; }
  .dot.busy { background: var(--accent); animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  .chat { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 14px 8px; }
  .bubble { max-width: 88%; padding: 10px 14px; border-radius: 18px; margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; font-size: 16.5px; line-height: 1.5; }
  .user { background: var(--me); margin-left: auto; border-bottom-right-radius: 6px; }
  .assistant { background: transparent; margin-right: auto; padding-left: 2px; max-width: 96%; }
  .feedimg { display: block; max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid var(--border); }
  .status { text-align: center; color: var(--dim); font-size: 12px; margin: 8px 0; }
  .status.err { color: #c0564a; }
  .working { display: flex; align-items: center; gap: 8px; color: var(--dim); font-size: 13px; margin: 6px 0 12px 2px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .composerWrap { position: fixed; left: 0; right: 0; bottom: 0; padding: 8px 12px calc(var(--safe-bottom) + 10px); background: var(--bg); z-index: 20; will-change: transform; }
  body.kb-open .composerWrap { padding-bottom: 6px; }
  #chatScreen .chat { padding-bottom: 76px; }
  .composer { background: var(--card); border: 1px solid var(--border); border-radius: 22px; box-shadow: var(--shadow); padding: 10px 12px 8px; }
  .composer textarea { width: 100%; background: none; color: var(--text); border: none; font-size: 18px; line-height: 1.4; font-family: inherit; resize: none; max-height: 150px; outline: none; padding: 4px 4px 10px; }
  .composer textarea::placeholder { color: var(--dim); }
  .crow { display: flex; align-items: center; gap: 4px; }
  .crow .spacer { flex: 1; }
  .cbtn { width: 34px; height: 34px; border-radius: 50%; background: none; border: none; color: var(--dim); font-size: 19px; display: flex; align-items: center; justify-content: center; }
  .cbtn:active { background: var(--card2); }
  .sendbtn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 17px; display: flex; align-items: center; justify-content: center; }
  .sendbtn:disabled { opacity: .35; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .chip { display: flex; align-items: center; gap: 6px; background: var(--accent-soft); color: var(--text); border-radius: 12px; padding: 5px 10px; font-size: 12px; max-width: 200px; }
  .chip span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip button { background: none; border: none; color: var(--dim); font-size: 14px; }
  .chip img { width: 22px; height: 22px; border-radius: 6px; object-fit: cover; }

  .empty { color: var(--dim); text-align: center; margin-top: 40vh; font-size: 14px; }

  .sessrow { display: flex; align-items: stretch; gap: 4px; margin-bottom: 8px; max-width: 100%; }
  .sessrow .sess { flex: 1 1 auto; width: auto; min-width: 0; margin-bottom: 0; }
  .more { width: 32px; border-radius: 14px; background: none; border: none; color: var(--dim); font-size: 20px; flex: none; padding: 0; }

  .sheetBg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; display: flex; align-items: flex-end; }
  .sheet { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; padding: 14px 14px calc(var(--safe-bottom) + 16px); }
  .sheet h3 { font-size: 14px; color: var(--dim); font-weight: 600; margin: 4px 4px 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sheet button.opt { display: block; width: 100%; text-align: center; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 16px; font-weight: 600; padding: 14px; border-radius: 14px; margin-bottom: 8px; }
  .sheet button.opt:active { background: var(--card2); }
  .sheet button.cancel { background: none; border: none; color: var(--dim); font-weight: 600; }
</style>
</head>
<body>

<div id="listScreen" class="screen">
  <header>
    <div class="mid" style="text-align:left"><h1>Pocket Claude</h1><div class="sub" id="listStatus"></div></div>
    <button class="iconbtn" id="bellBtn" onclick="enablePush()" title="Alerts">&#128276;</button>
  </header>
  <div class="list" id="sessionList"><div class="empty">Loading sessions…</div></div>
</div>

<div id="chatScreen" class="screen hidden">
  <header>
    <button class="iconbtn" onclick="showList()">‹</button>
    <div class="mid"><h1 id="chatTitle"></h1><div class="sub" id="chatSub"></div></div>
    <div style="width:38px"></div>
  </header>
  <div class="chat" id="chat"></div>
  <div class="composerWrap">
    <div class="composer">
      <div class="chips" id="chips"></div>
      <textarea id="input" rows="1" placeholder="Message this session…"></textarea>
      <div class="crow">
        <button class="cbtn" onclick="pickFile()" title="Attach">&#128206;</button>
        <div class="spacer"></div>
        <button class="sendbtn" id="sendBtn" onclick="send()">↑</button>
      </div>
    </div>
  </div>
  <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.csv,.md,.json" style="display:none">
</div>

<script>
let current = null;
let pollTimer = null;
let lastMtime = 0;
let pendingText = null;
let attachments = []; // {path, name, isImage}

const $ = (id) => document.getElementById(id);

function loadSet(key) {
  try { return new Set(JSON.parse(localStorage.getItem(key) || "[]")); }
  catch (e) { return new Set(); }
}
function saveSet(key, set) { localStorage.setItem(key, JSON.stringify([...set])); }
const openHeads = loadSet("pc_openGroups");
function toggle(set, key, storeKey) {
  if (set.has(key)) set.delete(key); else set.add(key);
  saveSet(storeKey, set);
  loadList();
}

function ago(ts) {
  const s = (Date.now() / 1000) - ts;
  if (s < 60) return "now";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}

async function loadList() {
  try {
    const r = await fetch("/api/sessions");
    const data = await r.json();
    const el = $("sessionList");
    el.innerHTML = "";
    for (const grp of data.groups) {
      const headOpen = openHeads.has(grp.name);
      const anyBusy = grp.sessions.some(s => s.busy);
      const anyLive = grp.sessions.some(s => s.live);
      const gh = document.createElement("button");
      gh.className = "ghead" + (headOpen ? " open" : "");
      const gdot = anyBusy ? '<span class="dot busy"></span>' : (anyLive ? '<span class="dot live"></span>' : "");
      gh.innerHTML = `<span class="chev">›</span>${gdot}<span></span><span class="cnt">${grp.sessions.length}</span>`;
      gh.querySelector("span:nth-last-child(2)").textContent = grp.name;
      gh.onclick = () => toggle(openHeads, grp.name, "pc_openGroups");
      el.appendChild(gh);
      if (!headOpen) continue;
      for (const s of grp.sessions) {
        const row = document.createElement("div");
        row.className = "sessrow";
        const b = document.createElement("button");
        b.className = "sess";
        const sdot = s.busy ? '<span class="dot busy"></span>' : (s.live ? '<span class="dot live"></span>' : "");
        b.innerHTML = `<div class="t">${sdot}<span class="title"></span></div><div class="p"></div><div class="when"></div>`;
        b.querySelector(".title").textContent = s.title;
        b.querySelector(".p").textContent = s.preview;
        b.querySelector(".when").textContent = s.project + " · " + ago(s.mtime);
        b.onclick = () => openChat(s.dir, s.id, s.title, s.project);
        const m = document.createElement("button");
        m.className = "more";
        m.textContent = "⋯";
        m.onclick = (e) => { e.stopPropagation(); sessionMenu(s); };
        row.appendChild(b);
        row.appendChild(m);
        el.appendChild(row);
      }
    }
    if (!data.groups.length) el.innerHTML = '<div class="empty">No sessions found</div>';
    $("listStatus").textContent = "";
  } catch (e) {
    $("listStatus").textContent = "offline?";
  }
}

function showList() {
  current = null;
  clearInterval(pollTimer);
  document.activeElement && document.activeElement.blur();
  $("chatScreen").classList.add("hidden");
  const wrap = document.querySelector(".composerWrap");
  if (wrap) wrap.style.transform = "";
  document.body.classList.remove("kb-open");
  $("listScreen").classList.remove("hidden");
  loadList();
}

async function openChat(dir, id, title, project) {
  current = { dir, id, title };
  lastMtime = 0;
  pendingText = null;
  attachments = [];
  renderChips();
  $("chatTitle").textContent = title;
  $("chatSub").textContent = project || "";
  $("chat").innerHTML = '<div class="status">Loading…</div>';
  $("listScreen").classList.add("hidden");
  $("chatScreen").classList.remove("hidden");
  fitViewport();
  await refreshChat(true);
  clearInterval(pollTimer);
  pollTimer = setInterval(refreshChat, 3000);
}

async function refreshChat(force) {
  if (!current) return;
  try {
    const r = await fetch(`/api/session/${current.dir}/${current.id}`);
    const d = await r.json();
    const busy = d.busy;
    $("chatSub").textContent = busy ? "working…" : ($("chatSub").dataset.proj || $("chatSub").textContent);
    $("sendBtn").disabled = busy;
    if (!force && d.mtime === lastMtime && !busy && !pendingText) return;
    lastMtime = d.mtime;
    const chat = $("chat");
    const nearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 120;
    chat.innerHTML = "";
    for (const t of d.turns) addBubble(t.role, t.text, t.images);
    if (pendingText) {
      const shown = d.turns.some(t => t.role === "user" && t.text.startsWith(pendingText.slice(0, 40)));
      if (shown) pendingText = null;
      else addBubble("user", pendingText);
    }
    if (busy) {
      const w = document.createElement("div");
      w.className = "working";
      w.innerHTML = '<div class="spinner"></div> Claude is working…';
      chat.appendChild(w);
    }
    if (d.job && d.job.status === "error" && d.job.error) {
      const s = document.createElement("div");
      s.className = "status err";
      s.textContent = "Error: " + d.job.error;
      chat.appendChild(s);
    }
    if (force || nearBottom) chat.scrollTop = chat.scrollHeight;
  } catch (e) { /* transient */ }
}

function addBubble(role, text, images) {
  const b = document.createElement("div");
  b.className = "bubble " + (role === "user" ? "user" : "assistant");
  if (text) {
    const t = document.createElement("div");
    t.textContent = text;
    b.appendChild(t);
  }
  if (images && images.length) {
    for (const url of images) {
      const img = document.createElement("img");
      img.src = url;
      img.className = "feedimg";
      img.onclick = () => window.open(url, "_blank");
      b.appendChild(img);
    }
  }
  $("chat").appendChild(b);
}

// ---- attachments
function pickFile() { $("fileInput").click(); }

$("fileInput").addEventListener("change", async (e) => {
  for (const f of e.target.files) {
    try {
      const r = await fetch(`/api/session/${current.dir}/${current.id}/upload?name=${encodeURIComponent(f.name)}`, {
        method: "POST", body: f,
      });
      const d = await r.json();
      if (d.path) attachments.push({ path: d.path, name: f.name, isImage: f.type.startsWith("image/"), url: URL.createObjectURL(f) });
    } catch (err) { alert("Upload failed"); }
  }
  e.target.value = "";
  renderChips();
});

function renderChips() {
  const c = $("chips");
  c.innerHTML = "";
  attachments.forEach((a, i) => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.innerHTML = (a.isImage ? `<img src="${a.url}">` : "📄") + `<span></span><button>✕</button>`;
    chip.querySelector("span").textContent = a.name;
    chip.querySelector("button").onclick = () => { attachments.splice(i, 1); renderChips(); };
    c.appendChild(chip);
  });
}

async function send() {
  const input = $("input");
  const text = input.value.trim();
  if ((!text && !attachments.length) || !current) return;
  input.value = "";
  input.style.height = "auto";
  const paths = attachments.map(a => a.path);
  const shownText = text || "(sent attachment)";
  attachments = [];
  renderChips();
  pendingText = shownText;
  addBubble("user", shownText);
  $("chat").scrollTop = $("chat").scrollHeight;
  $("sendBtn").disabled = true;
  try {
    const r = await fetch(`/api/session/${current.dir}/${current.id}/send`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, attachments: paths }),
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      const s = document.createElement("div");
      s.className = "status err";
      s.textContent = d.error || "send failed";
      $("chat").appendChild(s);
    }
  } catch (e) {
    const s = document.createElement("div");
    s.className = "status err";
    s.textContent = "send failed — offline?";
    $("chat").appendChild(s);
  }
  refreshChat(true);
}

const input = $("input");
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 130) + "px";
});

// ---- session menu (rename / move / new group)
function sheet(title, options) {
  return new Promise((resolve) => {
    const bg = document.createElement("div");
    bg.className = "sheetBg";
    const sh = document.createElement("div");
    sh.className = "sheet";
    const h = document.createElement("h3");
    h.textContent = title;
    sh.appendChild(h);
    for (const o of options) {
      const b = document.createElement("button");
      b.className = "opt";
      b.textContent = o.label;
      b.onclick = () => { document.body.removeChild(bg); resolve(o.value); };
      sh.appendChild(b);
    }
    const c = document.createElement("button");
    c.className = "opt cancel";
    c.textContent = "Cancel";
    c.onclick = () => { document.body.removeChild(bg); resolve(null); };
    sh.appendChild(c);
    bg.onclick = (e) => { if (e.target === bg) { document.body.removeChild(bg); resolve(null); } };
    bg.appendChild(sh);
    document.body.appendChild(bg);
  });
}

async function sessionMenu(s) {
  const act = await sheet(s.title, [
    { label: "✏️ Rename", value: "rename" },
    { label: "📁 Move to group", value: "move" },
    { label: "⬆︎ Move up", value: "up" },
    { label: "⬇︎ Move down", value: "down" },
  ]);
  if (act === "up" || act === "down") {
    await fetch(`/api/session/${s.id}/reorder`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ direction: act }),
    });
    loadList();
  } else if (act === "rename") {
    const name = prompt("New name:", s.title);
    if (!name || !name.trim()) return;
    const r = await fetch(`/api/session/${s.id}/rename`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: name.trim() }),
    });
    if (!r.ok) alert("Rename failed");
    loadList();
  } else if (act === "move") {
    const gr = await (await fetch("/api/groups")).json();
    const opts = gr.groups.map(g => ({ label: g.name, value: g.id }));
    opts.push({ label: "🚫 Ungroup", value: "" });
    opts.push({ label: "＋ New group…", value: "__new__" });
    let gid = await sheet("Move \"" + s.title + "\" to…", opts);
    if (gid === null) return;
    if (gid === "__new__") {
      const name = prompt("Group name:");
      if (!name || !name.trim()) return;
      const r = await (await fetch("/api/groups/new", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name.trim() }),
      })).json();
      gid = r.id;
    }
    const r = await fetch(`/api/session/${s.id}/move`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ group_id: gid }),
    });
    if (!r.ok) alert("Move failed");
    loadList();
  }
}

// ---- push notifications
function urlB64ToUint8(base64) {
  const pad = "=".repeat((4 - (base64.length % 4)) % 4);
  const b64 = (base64 + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(b64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function registerSW() {
  if (!("serviceWorker" in navigator)) return null;
  try { return await navigator.serviceWorker.register("/sw.js"); }
  catch (e) { return null; }
}

async function enablePush() {
  if (!("Notification" in window) || !("serviceWorker" in navigator)) {
    alert("Add Pocket Claude to your Home Screen first, then open it from there to enable alerts.");
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== "granted") { alert("Notifications not allowed."); return; }
  const reg = await registerSW();
  if (!reg) { alert("Could not register."); return; }
  const { key } = await (await fetch("/api/vapid-public")).json();
  const sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlB64ToUint8(key),
  });
  await fetch("/api/subscribe", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ subscription: sub }),
  });
  localStorage.setItem("pc_pushOn", "1");
  $("bellBtn").textContent = "🔔";
  $("bellBtn").style.color = "var(--accent)";
  alert("Alerts on! You'll get a notification when a session finishes or needs you.");
}

// notification tap → open that session
navigator.serviceWorker && navigator.serviceWorker.addEventListener("message", (e) => {
  if (e.data && e.data.type === "open" && e.data.dir && e.data.id) {
    openChat(e.data.dir, e.data.id, "Session", "");
  }
});

// deep link on cold start (?open=dir:id)
(function () {
  const p = new URLSearchParams(location.search).get("open");
  if (p) {
    const i = p.lastIndexOf(":");
    if (i > 0) setTimeout(() => openChat(p.slice(0, i), p.slice(i + 1), "Session", ""), 300);
  }
})();

if (localStorage.getItem("pc_pushOn")) {
  registerSW();
  $("bellBtn").textContent = "🔔";
  $("bellBtn").style.color = "var(--accent)";
}

// ---- keep the composer glued to the top of the keyboard (iOS)
const vv = window.visualViewport;
function fitViewport() {
  if (!vv) return;
  const wrap = document.querySelector(".composerWrap");
  if (!wrap || $("chatScreen").classList.contains("hidden")) return;
  const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
  wrap.style.transform = `translateY(-${kb}px)`;
  document.body.classList.toggle("kb-open", kb > 80);
  const chat = $("chat");
  if (chat) chat.scrollTop = chat.scrollHeight;
}
if (vv) {
  vv.addEventListener("resize", fitViewport);
  vv.addEventListener("scroll", fitViewport);
}

loadList();
setInterval(() => { if (!current) loadList(); }, 8000);
</script>
